<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; font-src 'self'; frame-src 'none';">
  <title>Selfmade — Minimal Shooter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="lives">Lives: 3</div>
    <div id="version">v0.1.30</div>
  </div>
  <canvas id="game"></canvas>
  <div id="touch-controls">
    <button id="leftBtn">◀</button>
    <button id="fireBtn">●</button>
    <button id="rightBtn">▶</button>
  </div>
  <div id="overlay" aria-hidden="true">
    <button id="replayBtn">Play Again</button>
  </div>
  <script src="js/game.js"></script>
</body>
</html>

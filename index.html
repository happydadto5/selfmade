<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; font-src 'self'; frame-src 'none'; worker-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; manifest-src 'none';">
  <title>Selfmade — Minimal Shooter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="ui">
    <div id="score" role="status" aria-live="polite" aria-atomic="true">Score: 0</div>
    <div id="lives" role="status" aria-live="polite" aria-atomic="true">Lives: 3</div>
    <div id="wave" role="status" aria-live="polite" aria-atomic="true">Wave: 0</div>
  </div>
  <div id="version" role="status" aria-live="polite" aria-atomic="true">v1.23.0</div>
  <button id="muteBtn" aria-label="Toggle sound" aria-pressed="false" title="Toggle sound">🔊</button>
  <canvas id="game"></canvas>
  <div id="touch-controls">
    <button id="leftBtn" aria-label="Move left">◀</button>
    <button id="fireBtn" aria-label="Fire">●</button>
    <button id="rightBtn" aria-label="Move right">▶</button>
  </div>
  <div id="overlay" aria-hidden="true" role="status" aria-live="assertive" aria-atomic="true">
    <button id="replayBtn">Play Again</button>
  </div>
  <script src="js/game.js"></script>
</body>
</html>

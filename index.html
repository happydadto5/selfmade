<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; font-src 'self'; frame-src 'none'; worker-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; manifest-src 'none';">
  <title>Selfmade — Minimal Shooter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="ui">
    <div id="score" role="status" aria-live="polite" aria-atomic="true">Score: 0</div>
    <div id="lives" role="status" aria-live="polite" aria-atomic="true">Lives: 3</div>
    <div id="wave" role="status" aria-live="polite" aria-atomic="true">Wave: 0</div>
  </div>
  <!-- Hidden live region for assistive tech: announced messages are written here by the game (visually hidden but exposed to screen readers) -->
  <div id="life-announcer" aria-live="assertive" aria-atomic="true" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;"> </div>
  <!-- Auto-pause announcer (visually hidden) — used to announce Auto-Pause toggles to assistive tech -->
  <div id="autopause-announcer" aria-live="polite" aria-atomic="true" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;"> </div>
  <div id="game-desc" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Controls: Use left/right arrow or A/D to move. Press Space to fire. On touch devices, tap left/right to move and tap center to fire. Press P to pause.</div>
  <div id="version" role="status" aria-live="polite" aria-atomic="true">v2.159.0</div>
  <button id="muteBtn" aria-label="Toggle sound" aria-pressed="false" title="Toggle sound">🔊</button>
  <button id="autopauseBtn" aria-label="Toggle auto-pause" aria-pressed="true" title="Toggle auto-pause">Auto-Pause</button>
  <button id="changesBtn" aria-label="Changes" title="Show recent changes">≡</button>
  <button id="helpBtn" aria-label="Help" title="Help">?</button>
  <canvas id="game" tabindex="0" role="application" aria-label="Game canvas: use arrow keys or touch; press P to pause" aria-describedby="game-desc"></canvas>
  <div id="touch-controls" aria-hidden="true">
    <button id="leftBtn" aria-label="Move left">◀</button>
    <button id="fireBtn" aria-label="Fire">●</button>
    <button id="rightBtn" aria-label="Move right">▶</button>
  </div>
  <div id="overlay" aria-hidden="true" role="dialog" aria-modal="false" aria-live="assertive" aria-atomic="true">
    <button id="replayBtn" aria-label="Play Again (press R to restart)">Play Again</button>
    <button id="resumeBtn" aria-label="Resume game" style="display:none;margin-left:12px;">Resume</button>
  </div>
  <script src="js/game.js"></script>
</body>
</html>
